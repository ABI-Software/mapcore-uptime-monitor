# Change these first
owner: ABI-Software # Your GitHub organization or username, where this repository lives
repo: mapcore-uptime-checker # The name of this repository

sites:
  - name: Production Flatmap
    url: https://mapcore-demo.org/current/flatmap/v3/
    maxResponseTime: 10000
  - name: Staging Flatmap
    url: https://mapcore-demo.org/staging/flatmap/v1/
    maxResponseTime: 10000
  - name: Devel Flatmap
    url: https://mapcore-demo.org/devel/flatmap/v4/
    maxResponseTime: 10000
  - name: SPARC Portal
    url: https://sparc.science
    maxResponseTime: 10000
  - name: SPARC API
    url: http://api.sparc.science/health
    maxResponseTime: 10000
assignees: # Users to assign downtime issues (optional)
  - alan-wu
status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  baseUrl: /mapcore-uptime-checker
  # baseUrl: /your-repo-name
  logoUrl: https://avatars.githubusercontent.com/u/5274092?s=200&v=4
  name: MAPCore Server Status

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * *"
  updates: "0 3 * * *"
  uptime: "*/5 * * * *"

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
